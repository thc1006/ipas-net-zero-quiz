# CI 工作流程 - PR 驗證
# 確保 PR 是完整且正確的
# 最後更新：2026-01-22（完整優化版）

name: Quiz App CI

on:
  # 移除 branches filter — stacked PRs (base != main) 也須跑 CI
  pull_request:
    paths:
      - 'quiz-app/**'
      - '.github/workflows/quiz-app-*.yml'
  push:
    branches: [main]
    paths:
      - 'quiz-app/**'
      - '.github/workflows/quiz-app-*.yml'
  workflow_dispatch:

# 顯式宣告最小權限
permissions:
  contents: read
  pull-requests: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: quiz-app

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (preliminary, for npm)
        uses: actions/setup-node@v4
        with:
          node-version-file: 'quiz-app/.nvmrc'

      # 修 nodejs/corepack#612 — Node 20.18 內建 Corepack 簽名公鑰過期；先升級到最新
      - name: Upgrade Corepack to latest
        run: npm install -g corepack@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: quiz-app/package.json
          run_install: false

      - name: Re-setup Node.js (with pnpm store cache)
        uses: actions/setup-node@v4
        with:
          node-version-file: 'quiz-app/.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'quiz-app/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (preliminary, for npm)
        uses: actions/setup-node@v4
        with:
          node-version-file: 'quiz-app/.nvmrc'

      # 修 nodejs/corepack#612 — Node 20.18 內建 Corepack 簽名公鑰過期；先升級到最新
      - name: Upgrade Corepack to latest
        run: npm install -g corepack@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: quiz-app/package.json
          run_install: false

      - name: Re-setup Node.js (with pnpm store cache)
        uses: actions/setup-node@v4
        with:
          node-version-file: 'quiz-app/.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'quiz-app/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: quiz-app/coverage/
          retention-days: 7

      # Codecov upload — 若 repo 未設 CODECOV_TOKEN，action 會 silently 跳過
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        continue-on-error: true
        with:
          files: ./quiz-app/coverage/coverage-final.json
          flags: unit
          fail_ci_if_error: false

  build:
    name: Build & Bundle Size
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (preliminary, for npm)
        uses: actions/setup-node@v4
        with:
          node-version-file: 'quiz-app/.nvmrc'

      # 修 nodejs/corepack#612 — Node 20.18 內建 Corepack 簽名公鑰過期；先升級到最新
      - name: Upgrade Corepack to latest
        run: npm install -g corepack@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: quiz-app/package.json
          run_install: false

      - name: Re-setup Node.js (with pnpm store cache)
        uses: actions/setup-node@v4
        with:
          node-version-file: 'quiz-app/.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'quiz-app/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Report bundle size
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for file in dist/assets/*.js dist/assets/*.css; do
            if [ -f "$file" ]; then
              size=$(du -h "$file" | cut -f1)
              name=$(basename "$file")
              echo "| $name | $size |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          total=$(du -sh dist | cut -f1)
          echo "**Total: $total**" >> $GITHUB_STEP_SUMMARY

      - name: Check bundle size limit
        run: |
          js_total=0
          for file in dist/assets/*.js; do
            if [ -f "$file" ]; then
              size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null)
              js_total=$((js_total + size))
            fi
          done
          limit=$((600 * 1024))
          js_kb=$((js_total / 1024))
          limit_kb=$((limit / 1024))
          if [ "$js_total" -gt "$limit" ]; then
            echo "::warning::JavaScript bundle ${js_kb}KB exceeds ${limit_kb}KB limit"
            echo "BUNDLE_OVER_LIMIT=true" >> $GITHUB_ENV
          else
            echo "Bundle size OK: ${js_kb}KB (limit ${limit_kb}KB)"
          fi
          echo "BUNDLE_JS_KB=${js_kb}" >> $GITHUB_ENV

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: quiz-app/dist/
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (preliminary, for npm)
        uses: actions/setup-node@v4
        with:
          node-version-file: 'quiz-app/.nvmrc'

      # 修 nodejs/corepack#612 — Node 20.18 內建 Corepack 簽名公鑰過期；先升級到最新
      - name: Upgrade Corepack to latest
        run: npm install -g corepack@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: quiz-app/package.json
          run_install: false

      - name: Re-setup Node.js (with pnpm store cache)
        uses: actions/setup-node@v4
        with:
          node-version-file: 'quiz-app/.nvmrc'
          cache: 'pnpm'
          cache-dependency-path: 'quiz-app/pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: quiz-app/dist/

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: quiz-app/playwright-report/
          retention-days: 7
