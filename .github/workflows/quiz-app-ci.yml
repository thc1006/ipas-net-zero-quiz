# CI 工作流程 - PR 驗證
# 確保 PR 是完整且正確的
# 最後更新：2026-01-22（完整優化版）

name: Quiz App CI

on:
  # 移除 branches filter — stacked PRs (base != main) 也須跑 CI
  #
  # path 必須包含 .github/scripts/** 與 quarterly workflow 本身：
  # 這裡的 url-status job 測的就是那些檔案。少了它們，「只改分類器」的 PR
  # 根本不會觸發 CI —— 最需要跑分類器測試的修改，反而完全略過分類器測試。
  # （這正是 `*) DEAD` catch-all 與 `grep -c || echo 0` 能活那麼久沒被發現的環境。）
  pull_request:
    paths:
      - 'quiz-app/**'
      - '.github/workflows/quiz-app-*.yml'
      - '.github/scripts/**'
      - '.github/workflows/quarterly-time-sensitive-verify.yml'
  push:
    branches: [main]
    paths:
      - 'quiz-app/**'
      - '.github/workflows/quiz-app-*.yml'
      - '.github/scripts/**'
      - '.github/workflows/quarterly-time-sensitive-verify.yml'
  workflow_dispatch:

# 顯式宣告最小權限
permissions:
  contents: read
  pull-requests: read
  checks: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: quiz-app

jobs:
  # quarterly-time-sensitive-verify 的 URL 狀態分類器（.github/scripts/url-status.sh）。
  # 之前這段邏輯寫死在 workflow 裡，只能靠「等季排程跑一次、看它報什麼」來驗證，
  # 所以 catch-all 的 `*) DEAD`（把 503、TLS 錯誤、逾時都當成連結已死）活了很久沒被發現。
  # 現在抽成獨立 script + 離線 status matrix 測試，每個 PR 都跑。
  url-status:
    name: URL status classifier (offline matrix)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shell syntax check
        run: |
          for f in .github/scripts/*.sh; do
            echo "bash -n $f"
            bash -n "$f"
          done

      - name: Status matrix (no network)
        run: bash .github/scripts/url-status.test.sh

      # 「curl -> DNS 二次確認 -> 分類」這段 glue 的測試（假 curl / 假 dig，離線）。
      # glue 正是 bug 的居所：這支測試第一次跑就抓到 resolve_dns_status 會在
      # 「只有一個 resolver 說 NXDOMAIN」時就升級成 DEAD_DNS —— 「兩邊都要同意」
      # 的把關被最後一行 `else echo "$r1"` 整個繞過了。
      - name: check_url glue test (fake curl/dig, no network)
        run: bash .github/scripts/check-url.test.sh

      # 聚合階段（計數 + $GITHUB_OUTPUT）也必須測。
      # `grep -c ... || echo 0` 產生 $'0\n0'、讓 $(( )) syntax error 進而炸掉整個 step 的
      # 那個 bug，就發生在聚合 —— 而當時的測試只涵蓋分類器，完全沒碰聚合。
      # 把最容易出錯的那一段排除在測試之外，等於沒測。
      - name: Aggregation integration test (fixture, no network)
        run: bash .github/scripts/aggregate-results.test.sh

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'quiz-app/.nvmrc'

      # 修 nodejs/corepack#612 — Node 20.18 內建 Corepack 簽名公鑰過期
      - name: Upgrade Corepack to latest
        run: npm install -g corepack@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: quiz-app/package.json
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('quiz-app/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint

      - name: Type check
        run: pnpm type-check

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'quiz-app/.nvmrc'

      # 修 nodejs/corepack#612 — Node 20.18 內建 Corepack 簽名公鑰過期
      - name: Upgrade Corepack to latest
        run: npm install -g corepack@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: quiz-app/package.json
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('quiz-app/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Unit tests with coverage
        run: pnpm test:coverage

      - name: Upload coverage report (artifact)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: quiz-app/coverage/
          retention-days: 7

      # Codecov upload — 若 repo 未設 CODECOV_TOKEN，action 會 silently 跳過
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: always()
        continue-on-error: true
        with:
          files: ./quiz-app/coverage/coverage-final.json
          flags: unit
          fail_ci_if_error: false

  build:
    name: Build & Bundle Size
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'quiz-app/.nvmrc'

      # 修 nodejs/corepack#612 — Node 20.18 內建 Corepack 簽名公鑰過期
      - name: Upgrade Corepack to latest
        run: npm install -g corepack@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: quiz-app/package.json
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('quiz-app/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Report bundle size
        run: |
          echo "## Bundle Size Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| File | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          for file in dist/assets/*.js dist/assets/*.css; do
            if [ -f "$file" ]; then
              size=$(du -h "$file" | cut -f1)
              name=$(basename "$file")
              echo "| $name | $size |" >> $GITHUB_STEP_SUMMARY
            fi
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          total=$(du -sh dist | cut -f1)
          echo "**Total: $total**" >> $GITHUB_STEP_SUMMARY

      - name: Check bundle size limit
        run: |
          js_total=0
          for file in dist/assets/*.js; do
            if [ -f "$file" ]; then
              size=$(stat -c%s "$file" 2>/dev/null || stat -f%z "$file" 2>/dev/null)
              js_total=$((js_total + size))
            fi
          done
          limit=$((600 * 1024))
          js_kb=$((js_total / 1024))
          limit_kb=$((limit / 1024))
          if [ "$js_total" -gt "$limit" ]; then
            echo "::warning::JavaScript bundle ${js_kb}KB exceeds ${limit_kb}KB limit"
            echo "BUNDLE_OVER_LIMIT=true" >> $GITHUB_ENV
          else
            echo "Bundle size OK: ${js_kb}KB (limit ${limit_kb}KB)"
          fi
          echo "BUNDLE_JS_KB=${js_kb}" >> $GITHUB_ENV

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: quiz-app/dist/
          retention-days: 7

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [lint, test, build]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: 'quiz-app/.nvmrc'

      # 修 nodejs/corepack#612 — Node 20.18 內建 Corepack 簽名公鑰過期
      - name: Upgrade Corepack to latest
        run: npm install -g corepack@latest

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: quiz-app/package.json
          run_install: false

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('quiz-app/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: quiz-app/dist/

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: quiz-app/playwright-report/
          retention-days: 7
